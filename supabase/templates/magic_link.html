<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garnet 로그인</title>
  <style>
    body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f6f7; margin: 0; padding: 40px 16px; }
    .card { background: #fff; border-radius: 16px; max-width: 480px; margin: 0 auto; padding: 40px 36px; border: 1px solid #e8ebed; }
    .logo { font-size: 22px; font-weight: 700; color: #3182f6; margin-bottom: 28px; letter-spacing: -0.04em; }
    h1 { font-size: 20px; font-weight: 600; color: #191f28; letter-spacing: -0.03em; margin: 0 0 8px; }
    p { font-size: 14px; color: #6b7684; line-height: 1.7; margin: 0 0 24px; }
    .otp-box { background: #f5f6f7; border: 1px solid #e8ebed; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 24px; }
    .otp-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #6b7684; margin-bottom: 8px; }
    .otp-code { font-size: 36px; font-weight: 700; color: #191f28; letter-spacing: 0.2em; font-variant-numeric: tabular-nums; }
    .btn { display: inline-block; background: #3182f6; color: #fff; text-decoration: none; border-radius: 10px; padding: 13px 28px; font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .divider { border: none; border-top: 1px solid #e8ebed; margin: 24px 0; }
    .footer { font-size: 12px; color: #b0b8c1; margin-top: 28px; }
    .expire { font-size: 12px; color: #6b7684; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Garnet</div>
    <h1>로그인 인증</h1>
    <p>아래 방법 중 하나를 선택해 로그인하세요.</p>

    <div class="otp-box">
      <div class="otp-label">앱 인증 코드 (Electron 앱용)</div>
      <div class="otp-code">{{ .Token }}</div>
    </div>

    <p style="margin-bottom: 12px;">또는 브라우저에서 바로 열기:</p>
    <a class="btn" href="{{ .ConfirmationURL }}">매직 링크로 로그인</a>

    <hr class="divider" />

    <p class="expire">이 코드와 링크는 <strong>1시간</strong> 후 만료됩니다. 본인이 요청하지 않았다면 이 메일을 무시해주세요.</p>
    <p class="footer">Garnet — AI 워크스페이스</p>
  </div>
</body>
</html>
